<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Central neural core -->
  <circle cx="100" cy="100" r="18" fill="url(#grad1)" filter="url(#glow)" />
  <circle cx="100" cy="100" r="10" fill="#fff" opacity="0.3" />
  <!-- Orbital nodes -->
  <circle cx="55" cy="52" r="8" fill="url(#grad1)" opacity="0.9" />
  <circle cx="145" cy="52" r="8" fill="url(#grad1)" opacity="0.9" />
  <circle cx="160" cy="110" r="7" fill="url(#grad1)" opacity="0.85" />
  <circle cx="40" cy="110" r="7" fill="url(#grad1)" opacity="0.85" />
  <circle cx="70" cy="160" r="6.5" fill="url(#grad1)" opacity="0.8" />
  <circle cx="130" cy="160" r="6.5" fill="url(#grad1)" opacity="0.8" />
  <!-- Outer satellite nodes -->
  <circle cx="100" cy="28" r="4.5" fill="#8b5cf6" opacity="0.7" />
  <circle cx="172" cy="75" r="4" fill="#8b5cf6" opacity="0.65" />
  <circle cx="28" cy="75" r="4" fill="#8b5cf6" opacity="0.65" />
  <circle cx="165" cy="148" r="3.5" fill="#8b5cf6" opacity="0.6" />
  <circle cx="35" cy="148" r="3.5" fill="#8b5cf6" opacity="0.6" />
  <circle cx="100" cy="178" r="4" fill="#8b5cf6" opacity="0.65" />
  <!-- Neural pathways - inner ring to core -->
  <line x1="100" y1="82" x2="62" y2="56" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" />
  <line x1="100" y1="82" x2="138" y2="56" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" />
  <line x1="118" y1="100" x2="153" y2="110" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" />
  <line x1="82" y1="100" x2="47" y2="110" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" />
  <line x1="92" y1="116" x2="74" y2="155" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" />
  <line x1="108" y1="116" x2="126" y2="155" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" />
  <!-- Cross connections -->
  <line x1="55" y1="52" x2="145" y2="52" stroke="url(#grad2)" stroke-width="1" stroke-dasharray="4,4" opacity="0.4" />
  <line x1="40" y1="110" x2="160" y2="110" stroke="url(#grad2)" stroke-width="1" stroke-dasharray="4,4" opacity="0.4" />
  <line x1="70" y1="160" x2="130" y2="160" stroke="url(#grad2)" stroke-width="1" stroke-dasharray="4,4" opacity="0.4" />
  <!-- Outer pathways -->
  <line x1="55" y1="52" x2="100" y2="28" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="145" y1="52" x2="100" y2="28" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="145" y1="52" x2="172" y2="75" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="55" y1="52" x2="28" y2="75" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="160" y1="110" x2="165" y2="148" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="40" y1="110" x2="35" y2="148" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="130" y1="160" x2="100" y2="178" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <line x1="70" y1="160" x2="100" y2="178" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
  <!-- Pulse rings -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.2" />
  <circle cx="100" cy="100" r="65" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="#8b5cf6" stroke-width="0.3" opacity="0.08" />
</svg>
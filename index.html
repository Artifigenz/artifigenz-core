<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifigenz — AI-native products for the agentic era</title>
  <meta name="description" content="Artifigenz builds AI-native products for the agentic era. Founded by Cooper and Rajan RK.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080c;
      --surface: #0e0e14;
      --text: #e8e6f0;
      --text-dim: #9490a8;
      --accent: #8b5cf6;
      --accent-soft: #6366f1;
      --accent-glow: rgba(139, 92, 246, 0.15);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== TYPOGRAPHY ========== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    h1, h2, h3 { font-family: 'Space Grotesk', var(--font); }

    /* ========== CANVAS BACKGROUND ========== */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== AMBIENT BLOBS ========== */
    .ambient-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: blobFloat 20s ease-in-out infinite, blobFadeIn 2s ease-out forwards;
    }

    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      top: -10%; left: -5%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
      top: 30%; right: -10%;
      animation-delay: -7s;
      animation-duration: 25s;
    }

    .blob-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.08) 0%, transparent 70%);
      bottom: 0%; left: 20%;
      animation-delay: -14s;
      animation-duration: 22s;
    }

    .blob-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
      top: 60%; left: 60%;
      animation-delay: -4s;
      animation-duration: 28s;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 30px) scale(1.02); }
    }

    @keyframes blobFadeIn {
      to { opacity: 1; }
    }

    /* ========== GRAIN OVERLAY ========== */
    .grain {
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ========== LAYOUT ========== */
    .page-content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ========== HEADER / NAV ========== */
    header {
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark img {
      width: 38px;
      height: 38px;
    }

    .logo-mark span {
      font-family: 'Space Grotesk', var(--font);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-x {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      transition: color 0.3s ease;
    }

    .header-x:hover { color: var(--text); }

    .header-x svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }

    /* ========== HERO ========== */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 32px 60px;
      min-height: 70vh;
      position: relative;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #e8e6f0 0%, #c4b5fd 40%, #8b5cf6 70%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(30px);
      animation: heroReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .hero-tagline {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      max-width: 500px;
      opacity: 0;
      transform: translateY(20px);
      animation: heroReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    @keyframes heroReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Decorative line beneath hero */
    .hero-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin-top: 48px;
      opacity: 0;
      animation: heroReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    /* ========== PRODUCTS ========== */
    .products-section {
      padding: 80px 32px 100px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .products-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 48px;
      text-align: center;
      opacity: 0;
      animation: heroReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .products-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .product-item {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding: 28px 0;
      border-bottom: 1px solid rgba(139, 92, 246, 0.08);
      opacity: 0;
      transform: translateY(16px);
      cursor: default;
      transition: transform 0.3s ease;
    }

    .product-item:first-child {
      border-top: 1px solid rgba(139, 92, 246, 0.08);
    }

    .product-item:hover {
      transform: translateX(8px);
    }

    .product-item.visible {
      animation: productReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes productReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .product-name {
      font-family: 'Space Grotesk', var(--font);
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .product-dash {
      color: rgba(139, 92, 246, 0.3);
      font-weight: 300;
      flex-shrink: 0;
    }

    .product-desc {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--text-dim);
      font-weight: 300;
      line-height: 1.5;
    }

    /* Hover glow on product items */
    .product-item::before {
      content: '';
      position: absolute;
      left: -20px;
      width: 4px;
      height: 0;
      background: var(--accent);
      border-radius: 2px;
      transition: height 0.3s ease;
    }

    .product-item {
      position: relative;
    }

    .product-item:hover::before {
      height: 60%;
      top: 20%;
    }

    /* ========== FOOTER ========== */
    footer {
      padding: 48px 48px 40px;
      border-top: 1px solid rgba(139, 92, 246, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-founded {
      font-size: 0.9rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    .footer-founded a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
    }

    .footer-founded a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .footer-founded a:hover {
      color: var(--accent);
    }

    .footer-founded a:hover::after {
      width: 100%;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .footer-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s ease;
    }

    .footer-links a:hover { color: var(--text); }

    .footer-links svg {
      width: 14px; height: 14px;
      fill: currentColor;
    }

    /* ========== PARTICLE CANVAS ========== */
    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      header { padding: 20px 24px; }

      .hero { padding: 60px 24px 40px; min-height: 60vh; }

      .products-section { padding: 60px 24px 80px; }

      .product-item {
        flex-direction: column;
        gap: 6px;
        padding: 22px 0;
      }

      .product-dash { display: none; }

      .product-item:hover { transform: translateX(4px); }

      footer {
        padding: 32px 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }

    @media (max-width: 480px) {
      .logo-mark span { font-size: 1.05rem; }
      .hero-title { margin-bottom: 18px; }
    }

    /* ========== SELECTION ========== */
    ::selection {
      background: rgba(139, 92, 246, 0.3);
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="ambient-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- Particle system -->
  <canvas id="particle-canvas"></canvas>

  <!-- Grain texture -->
  <div class="grain"></div>

  <!-- Page content -->
  <div class="page-content">

    <!-- Header -->
    <header>
      <a href="/" class="logo-mark">
        <img src="assets/logo.svg" alt="Artifigenz logo">
        <span>Artifigenz</span>
      </a>
      <a href="https://x.com/FigenzAI" target="_blank" rel="noopener" class="header-x">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        @FigenzAI
      </a>
    </header>

    <!-- Hero -->
    <section class="hero">
      <h1 class="hero-title">Artifigenz</h1>
      <p class="hero-tagline">AI-native products for the agentic era</p>
      <div class="hero-divider"></div>
    </section>

    <!-- Products -->
    <section class="products-section">
      <p class="products-label">What we build</p>
      <div class="products-list">
        <div class="product-item" data-delay="0">
          <span class="product-name">AgentBoba</span>
          <span class="product-dash">&mdash;</span>

        <div class="product-item" data-delay="100">
          <span class="product-name">Guerilla</span>

          <span class="product-desc">AI marketing engine for X</span>
        </div>
        <div class="product-item" data-delay="200">
          <span class="product-name">TARS</span>
          <span class="product-dash">&mdash;</span>
          <span class="product-desc">shipping pulse dashboard</span>
        </div>
        <div class="product-item" data-delay="300">
          <span class="product-name">RunLife</span>
          <span class="product-dash">&mdash;</span>
          <span class="product-desc">personal life OS</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p class="footer-founded">
        Founded by
        <a href="https://x.com/CooperAIWorks" target="_blank" rel="noopener">Cooper</a>
        and
        <a href="https://x.com/rajanbuilds" target="_blank" rel="noopener">Rajan RK</a>
      </p>
      <div class="footer-links">
        <a href="https://x.com/FigenzAI" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          @FigenzAI
        </a>
      </div>
    </footer>

  </div>

  <script>
    /* ========== PARTICLE SYSTEM ========== */
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let mouse = { x: -1000, y: -1000 };
      let w, h;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      window.addEventListener('resize', resize);
      resize();

      const PARTICLE_COUNT = Math.min(80, Math.floor(w * h / 15000));
      const CONNECTION_DIST = 140;
      const MOUSE_DIST = 180;

      class Particle {
        constructor() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.r = Math.random() * 1.8 + 0.5;
          this.baseAlpha = Math.random() * 0.4 + 0.1;
          this.alpha = this.baseAlpha;
          this.pulseSpeed = Math.random() * 0.02 + 0.005;
          this.pulseOffset = Math.random() * Math.PI * 2;
        }

        update(t) {
          this.x += this.vx;
          this.y += this.vy;

          // Gentle drift toward mouse
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MOUSE_DIST && dist > 0) {
            const force = (1 - dist / MOUSE_DIST) * 0.008;
            this.vx += dx / dist * force;
            this.vy += dy / dist * force;
          }

          // Damping
          this.vx *= 0.998;
          this.vy *= 0.998;

          // Pulse
          this.alpha = this.baseAlpha + Math.sin(t * this.pulseSpeed + this.pulseOffset) * 0.08;

          // Wrap
          if (this.x < -10) this.x = w + 10;
          if (this.x > w + 10) this.x = -10;
          if (this.y < -10) this.y = h + 10;
          if (this.y > h + 10) this.y = -10;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(139, 92, 246, ${this.alpha})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }

      document.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      let frame = 0;
      function animate() {
        frame++;
        ctx.clearRect(0, 0, w, h);

        // Update & draw particles
        for (const p of particles) {
          p.update(frame);
          p.draw();
        }

        // Draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECTION_DIST) {
              const alpha = (1 - dist / CONNECTION_DIST) * 0.08;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(139, 92, 246, ${alpha})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(animate);
      }

      animate();
    })();

    /* ========== SCROLL REVEAL FOR PRODUCTS ========== */
    (function() {
      const items = document.querySelectorAll('.product-item');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const delay = parseInt(entry.target.dataset.delay) || 0;
            setTimeout(() => {
              entry.target.classList.add('visible');
            }, delay);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });

      items.forEach(item => observer.observe(item));
    })();
  </script>

</body>
